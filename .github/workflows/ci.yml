name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Tests run in offline mode — no real API keys needed
      OPENAI_API_KEY: ""
      LANGCHAIN_TRACING_V2: "false"
      WANDB_MODE: "disabled"
      CAE_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      # ── Build ML artifacts ─────────────────────────────────────────────────
      # These run once per CI job. In production they're pre-built and mounted
      # as volumes. In CI we regenerate from scratch on every push.

      - name: Generate synthetic data
        run: python data/generate_synthetic_data.py

      - name: Build FAISS + BM25 retriever index
        run: python knowledge_base/build_retriever.py

      - name: Train surrogate model
        run: python tools/surrogate_model.py

      # ── Run tests ──────────────────────────────────────────────────────────

      - name: Run unit + integration tests
        run: pytest tests/ -v --tb=short

      # ── Run offline evaluation (no OpenAI key needed) ──────────────────────

      - name: Run offline RAG evaluation
        run: python eval/run_eval.py

      # ── Upload evaluation results as CI artifact ───────────────────────────

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/eval_results.json
          retention-days: 30
