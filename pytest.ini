[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    --tb=short
    --strict-markers
    -q

# Custom markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests that require all components loaded
